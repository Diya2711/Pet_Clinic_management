name: pet_clinic_app
description: A Flutter-based Pet Clinic App for college project showcase.

version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.7
  
  # Firebase
  firebase_core: ^2.15.1
  firebase_auth: ^4.7.3
  cloud_firestore: ^4.8.0
  js: ^0.6.7
  
  # Email
  mailer: ^6.0.1
  http: ^1.1.2
  
  # Security
  crypto: ^3.0.3
  
  # PDF Generation
  pdf: ^3.10.8
  printing: ^5.12.0

flutter:
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700
